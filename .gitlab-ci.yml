variables:
    PIPELINE_NAME: "Waymate CI"

workflow:
    name: $PIPELINE_NAME
    rules:
        - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"
          when: never
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"
          variables:
              PIPELINE_NAME: "Waymate MR Pipeline"
        - if: $CI_PIPELINE_SOURCE == "push"
          variables:
              PIPELINE_NAME: "Waymate Branch Pipeline"

stages:
    - verify

default:
    image: oven/bun:1.3.10
    tags:
        - shared-fi
    cache:
        key: ${CI_COMMIT_REF_SLUG}
        paths:
            - .bun/install/cache
    before_script:
        - echo "//gitlab.fi.muni.cz/api/v4/projects/48090/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> ~/.npmrc
        - bun --version
        - bun install

generate-lockfile:
    stage: verify
    script:
        - echo "lockfile generated"
    artifacts:
        paths:
            - bun.lock
        expire_in: 1 day

lint:
    stage: verify
    script:
        - bun run lint

format:
    stage: verify
    script:
        - bun run format:check

typecheck:
    stage: verify
    script:
        - bun run typecheck

i18n-check:
    stage: verify
    script:
        - bun run --cwd apps/web i18n:check

test:
    stage: verify
    services:
        - name: postgres:18
          alias: postgres
    variables:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: waymate_test
        # Test env. The API's vitest globalSetup migrates this DB; per-test
        # isolation is TRUNCATE in test/setup.ts. config/env.ts requires the
        # auth/origin vars even though the test suite never sends real email.
        DATABASE_URL: "postgres://postgres:postgres@postgres:5432/waymate_test"
        BETTER_AUTH_URL: "http://localhost:3000"
        WEB_ORIGIN: "http://localhost:5173"
        RESEND_API_KEY: "re_ci_dummy_key"
        NODE_ENV: "test"
    script:
        - bun run test

build:
    stage: verify
    script:
        - bun run build

migration-drift:
    stage: verify
    script:
        - bun run --cwd apps/api db:generate
        - |
            if [ -n "$(git status --porcelain apps/api/drizzle)" ]; then
                echo "Schema in apps/api/src/db/schema/ drifted from apps/api/drizzle/."
                echo "Run 'bun run --cwd apps/api db:generate' locally and commit the new migration."
                git --no-pager diff -- apps/api/drizzle
                git status --short apps/api/drizzle
                exit 1
            fi
