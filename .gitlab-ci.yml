
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"

stages:
  - verify

default:
  image: oven/bun:1.3.10
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .bun/install/cache
  before_script:
    - bun --version
    - bun ci

lint:
  stage: verify
  script:
    - bun run lint

format_check:
  stage: verify
  script:
    - bun run format:check

typecheck:
  stage: verify
  script:
    - bun run typecheck

build:
  stage: verify
  script:
    - bun run build