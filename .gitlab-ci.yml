variables:
    PIPELINE_NAME: "Waymate CI"
    BUN_INSTALL_CACHE_DIR: "$CI_PROJECT_DIR/.bun-cache"

workflow:
    name: $PIPELINE_NAME
    rules:
        - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"
          when: never
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"
          variables:
              PIPELINE_NAME: "Waymate MR Pipeline"
        - if: $CI_PIPELINE_SOURCE == "push"
          variables:
              PIPELINE_NAME: "Waymate Branch Pipeline"

stages:
    - static-analysis
    - test
    - build
    - e2e

default:
    image: oven/bun:1.3.13
    tags:
        - local-pc
    cache:
        key: ${CI_COMMIT_REF_SLUG}
        paths:
            - .bun-cache
    before_script:
        - echo "//gitlab.fi.muni.cz/api/v4/projects/48090/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> ~/.npmrc
        - bun --version
        - timeout 2m bun install || timeout 2m bun install || timeout 2m bun install

lint:
    stage: static-analysis
    script:
        - bun run lint

format:
    stage: static-analysis
    script:
        - bun run format:check

typecheck:
    stage: static-analysis
    script:
        - bun run typecheck

i18n-check:
    stage: static-analysis
    script:
        - bun run --cwd apps/web i18n:check

test:
    stage: test
    services:
        - name: postgres:18
          alias: postgres
        - name: redis:7-alpine
          alias: redis
    variables:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: waymate_test
        # Test env. The API's vitest globalSetup migrates this DB; per-test
        # isolation is TRUNCATE in test/setup.ts. config/env.ts requires the
        # auth/origin vars even though the test suite never sends real email.
        DATABASE_URL: "postgres://postgres:postgres@postgres:5432/waymate_test"
        REDIS_URL: "redis://redis:6379"
        BETTER_AUTH_URL: "http://localhost:3000"
        WEB_ORIGIN: "http://localhost:5173"
        RESEND_API_KEY: "re_ci_dummy_key"
        NODE_ENV: "test"
    script:
        - apt-get update && apt-get install -y postgresql-client
        - until pg_isready -h postgres -p 5432 -U postgres; do sleep 1; done
        - bun run test

test-web:
    stage: test
    script:
        - bun run --cwd apps/web test

e2e:
    stage: e2e
    rules:
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    services:
        - name: postgres:18
          alias: postgres
        - name: redis:7-alpine
          alias: redis
    variables:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: postgres
        # Playwright boots its own API (port 3010) + web (5174) inside this job
        # container via its `webServer` config, so only Postgres is an external
        # service. global-setup.ts (run by start-api.ts) recreates
        # `spolujazda_e2e_db` on this service and runs db:reset (migrate + seed).
        E2E_DATABASE_URL: "postgres://postgres:postgres@postgres:5432/spolujazda_e2e_db"
        REDIS_URL: "redis://redis:6379"
    script:
        # Pull the Chromium build matching the installed Playwright, plus its
        # OS libraries (the bun image lacks them).
        - bunx playwright install --with-deps chromium
        - apt-get update && apt-get install -y postgresql-client
        - until pg_isready -h postgres -p 5432 -U postgres; do sleep 1; done
        - bun run --cwd e2e test
    artifacts:
        when: on_failure
        paths:
            - e2e/playwright-report/
            - e2e/test-results/
        expire_in: 1 week

build:
    stage: build
    script:
        - bun run build

migration-drift:
    stage: static-analysis
    script:
        - bun run --cwd apps/api db:generate
        - |
            if [ -n "$(git status --porcelain apps/api/drizzle)" ]; then
                echo "Schema in apps/api/src/db/schema/ drifted from apps/api/drizzle/."
                echo "Run 'bun run --cwd apps/api db:generate' locally and commit the new migration."
                git --no-pager diff -- apps/api/drizzle
                git status --short apps/api/drizzle
                exit 1
            fi
